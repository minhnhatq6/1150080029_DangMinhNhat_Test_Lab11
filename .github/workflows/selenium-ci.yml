name: Selenium Test Suite

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-tests:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        browser: [chrome, edge] # Đổi sang chạy Chrome và Microsoft Edge
      fail-fast: false
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cài đặt Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # Đã tạm xóa cache: maven để tránh lỗi báo không tìm thấy pom.xml

- name: Chạy Selenium Tests (${{ matrix.browser }})
        run: cd selenium-framework && mvn clean test -Dbrowser=${{ matrix.browser }} -Denv=staging -DsuiteXmlFile=testng-smoke.xml
        
      - name: Lưu kết quả test (Artifacts)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.browser }}
          path: |
            target/surefire-reports/
            target/screenshots/
            target/allure-results/
          retention-days: 30